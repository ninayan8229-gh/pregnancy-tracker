<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>稳稳的时光 - 孕期管理助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --pink-light: #FFF0F3;
    --pink-100: #FFE4EA;
    --pink-200: #FFC8D6;
    --pink-300: #FFA8BD;
    --pink-400: #FF85A3;
    --pink-500: #FF6B8A;
    --pink-600: #E8506F;
    --cream: #FFF8F0;
    --cream-dark: #F5EDE3;
    --lavender: #F0E6FF;
    --lavender-light: #F8F0FF;
    --mint: #E8F8F0;
    --peach: #FFE8D6;
    --text-primary: #4A3F55;
    --text-secondary: #7A6F85;
    --text-light: #A99BB5;
    --white: #FFFFFF;
    --shadow-sm: 0 2px 8px rgba(255, 107, 138, 0.08);
    --shadow-md: 0 4px 16px rgba(255, 107, 138, 0.12);
    --shadow-lg: 0 8px 32px rgba(255, 107, 138, 0.15);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--pink-light);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ===== Setup Screen ===== */
  .setup-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, var(--pink-light) 0%, var(--lavender-light) 50%, var(--cream) 100%);
    z-index: 100;
    overflow-y: auto;
  }

  .setup-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
    animation: fadeInUp 0.6s ease;
  }

  .setup-card .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .setup-card h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .setup-card .subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 32px;
  }

  .form-group {
    text-align: left;
    margin-bottom: 24px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .form-group input[type="date"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--pink-100);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--pink-light);
    outline: none;
    transition: all 0.3s;
  }

  .form-group input[type="date"]:focus {
    border-color: var(--pink-400);
    background: var(--white);
    box-shadow: 0 0 0 4px rgba(255, 107, 138, 0.1);
  }

  .tab-group {
    display: flex;
    background: var(--pink-light);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }

  .tab-btn.active {
    background: var(--white);
    color: var(--pink-500);
    box-shadow: var(--shadow-sm);
  }

  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-500) 100%);
    color: var(--white);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(255, 107, 138, 0.3);
  }

  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(255, 107, 138, 0.4);
  }

  /* ===== Main App ===== */
  .app {
    display: none;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  .app.active { display: block; }

  /* Header */
  .app-header {
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-500) 50%, #E8506F 100%);
    padding: 20px 24px 60px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }

  .app-header::before {
    content: '';
    position: absolute;
    top: -20px;
    right: -20px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }

  .app-header::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -10px;
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .header-top h1 {
    font-size: 20px;
    font-weight: 700;
  }

  .header-top .edit-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: var(--white);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.3s;
  }

  .header-top .edit-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  .week-display {
    position: relative;
    z-index: 1;
  }

  .week-display .week-num {
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .week-display .week-label {
    font-size: 14px;
    opacity: 0.9;
  }

  .week-display .trimester-tag {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    margin-top: 8px;
  }

  /* Progress Card */
  .progress-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin: -40px 16px 16px;
    box-shadow: var(--shadow-md);
    position: relative;
    z-index: 2;
  }

  .progress-bar-wrap {
    margin-bottom: 16px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-info .label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .progress-info .percent {
    font-size: 14px;
    font-weight: 700;
    color: var(--pink-500);
  }

  .progress-bar {
    height: 10px;
    background: var(--pink-100);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-300), var(--pink-500));
    border-radius: 10px;
    transition: width 0.8s ease;
  }

  .baby-size {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--cream);
    border-radius: var(--radius-sm);
  }

  .baby-size .emoji {
    font-size: 36px;
    line-height: 1;
  }

  .baby-size .info h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .baby-size .info p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .days-countdown {
    margin-top: 14px;
    text-align: center;
    padding: 10px;
    background: var(--lavender-light);
    border-radius: var(--radius-sm);
  }

  .days-countdown .num {
    font-size: 28px;
    font-weight: 700;
    color: #9B7FCC;
  }

  .days-countdown .txt {
    font-size: 12px;
    color: #A99BB5;
  }

  /* Section */
  .section {
    margin: 16px;
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .icon {
    font-size: 20px;
  }

  /* Fetal Development */
  .dev-card {
    display: flex;
    gap: 14px;
    padding: 14px;
    background: var(--pink-light);
    border-radius: var(--radius-md);
    margin-bottom: 12px;
    border-left: 4px solid var(--pink-300);
  }

  .dev-card .dev-emoji {
    font-size: 32px;
    flex-shrink: 0;
    width: 48px;
    text-align: center;
  }

  .dev-card .dev-content h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .dev-card .dev-content p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .dev-card:last-child { margin-bottom: 0; }

  /* Timeline Navigation */
  .timeline-nav {
    display: flex;
    gap: 8px;
    margin: 0 16px 16px;
    overflow-x: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
  }

  .timeline-nav::-webkit-scrollbar { display: none; }

  .timeline-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border: 2px solid var(--pink-100);
    background: var(--white);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .timeline-btn.active {
    background: var(--pink-500);
    border-color: var(--pink-500);
    color: var(--white);
  }

  .timeline-btn:hover:not(.active) {
    border-color: var(--pink-300);
    color: var(--pink-500);
  }

  /* Checklist */
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--pink-100);
  }

  .checklist-item:last-child { border-bottom: none; }

  .checklist-item input[type="checkbox"] {
    appearance: none;
    width: 22px;
    height: 22px;
    border: 2px solid var(--pink-200);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 1px;
  }

  .checklist-item input[type="checkbox"]:checked {
    background: var(--pink-400);
    border-color: var(--pink-400);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
    background-size: 14px;
    background-repeat: no-repeat;
    background-position: center;
  }

  .checklist-item .check-content h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .checklist-item .check-content.checked h4 {
    text-decoration: line-through;
    color: var(--text-light);
  }

  .checklist-item .check-content p {
    font-size: 12px;
    color: var(--text-light);
  }

  .checklist-item .check-content.checked p {
    color: var(--pink-200);
  }

  .checklist-item .check-tag {
    flex-shrink: 0;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    margin-top: 2px;
  }

  .tag-important {
    background: #FFE4E4;
    color: #E85050;
  }

  .tag-normal {
    background: var(--pink-100);
    color: var(--pink-500);
  }

  .tag-optional {
    background: var(--mint);
    color: #4CAF7D;
  }

  /* Tips */
  .tip-card {
    padding: 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .tip-card:last-child { margin-bottom: 0; }

  .tip-card .tip-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .tip-card .tip-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .tip-card .tip-text strong {
    color: var(--text-primary);
  }

  .tip-nutrition {
    background: var(--cream);
    border-left: 3px solid #FFB347;
  }

  .tip-exercise {
    background: var(--mint);
    border-left: 3px solid #4CAF7D;
  }

  .tip-care {
    background: var(--lavender-light);
    border-left: 3px solid #9B7FCC;
  }

  .tip-warning {
    background: #FFF5F5;
    border-left: 3px solid #FF6B6B;
  }

  /* Warning Banner */
  .warning-banner {
    margin: 16px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #FFF5F5, #FFE8E8);
    border-radius: var(--radius-sm);
    border: 1px solid #FFC8C8;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .warning-banner .warn-icon { font-size: 20px; }
  .warning-banner .warn-text {
    font-size: 12px;
    color: #C05050;
    line-height: 1.6;
  }

  /* Weight Tracker */
  .weight-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .weight-input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid var(--pink-100);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }

  .weight-input-row input:focus {
    border-color: var(--pink-300);
  }

  .weight-input-row button {
    padding: 10px 18px;
    background: var(--pink-400);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.3s;
  }

  .weight-input-row button:hover { background: var(--pink-500); }

  .weight-log {
    max-height: 200px;
    overflow-y: auto;
  }

  .weight-entry {
    display: flex;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--pink-100);
  }

  .weight-entry:last-child { border-bottom: none; }
  .weight-entry .date { flex: 1; color: var(--text-light); }
  .weight-entry .val { font-weight: 600; color: var(--text-primary); flex-shrink: 0; }
  .weight-entry .gain { margin-left: auto; font-size: 12px; color: var(--text-light); flex-shrink: 0; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--white);
    border-top: 1px solid var(--pink-100);
    display: flex;
    padding: 8px 0;
    padding-bottom: env(safe-area-inset-bottom, 8px);
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 0;
    cursor: pointer;
    transition: all 0.3s;
    background: none;
    border: none;
    font-family: inherit;
  }

  .nav-item .nav-icon {
    font-size: 22px;
  }

  .nav-item .nav-label {
    font-size: 11px;
    color: var(--text-light);
  }

  .nav-item.active .nav-label {
    color: var(--pink-500);
    font-weight: 600;
  }

  /* Page views */
  .page-view { display: none; }
  .page-view.active { display: block; }

  /* Animation */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-in {
    animation: fadeInUp 0.4s ease;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(74, 63, 85, 0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    animation: fadeInUp 0.3s ease;
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }

  .modal .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal .modal-btns button {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
  }

  .modal .btn-cancel {
    background: var(--pink-100);
    border: none;
    color: var(--text-secondary);
  }

  .modal .btn-confirm {
    background: var(--pink-500);
    border: none;
    color: var(--white);
  }

  /* Recipe Cards */
  .recipe-card {
    padding: 16px;
    border-radius: var(--radius-md);
    margin-bottom: 12px;
    background: var(--white);
    border: 1px solid var(--pink-100);
    transition: all 0.3s;
    cursor: default;
  }

  .recipe-card:hover {
    box-shadow: var(--shadow-sm);
    border-color: var(--pink-200);
  }

  .recipe-card:last-child { margin-bottom: 0; }

  .recipe-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .recipe-header .meal-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .meal-breakfast { background: var(--cream); color: #D4883E; }
  .meal-lunch { background: var(--mint); color: #3D9E6A; }
  .meal-dinner { background: var(--lavender-light); color: #8B6CB0; }
  .meal-snack { background: var(--peach); color: #CC7A4A; }

  .recipe-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .recipe-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 10px;
  }

  .recipe-ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .recipe-ingredients .ingredient {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--pink-light);
    color: var(--pink-600);
    border-radius: 12px;
  }

  .recipe-nutrition-bar {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--pink-100);
  }

  .recipe-nutrition-bar .nut-item {
    font-size: 11px;
    color: var(--text-light);
  }

  .recipe-nutrition-bar .nut-item span {
    color: var(--text-secondary);
    font-weight: 600;
  }

  .recipe-section-label {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 12px;
    text-align: center;
  }

  .recipe-date-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--peach) 100%);
    border-radius: 20px;
    font-size: 12px;
    color: #B07A4A;
    font-weight: 500;
  }

  .recipe-refresh-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .recipe-refresh-btn {
    background: none;
    border: 2px solid var(--pink-200);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--pink-500);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .recipe-refresh-btn:hover {
    background: var(--pink-light);
    border-color: var(--pink-400);
  }

  .recipe-week-tip {
    margin-top: 16px;
    padding: 14px;
    background: var(--cream);
    border-radius: var(--radius-sm);
    border-left: 3px solid #FFB347;
  }

  .recipe-week-tip h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .recipe-week-tip p {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// Firebase Config - 替换为你自己的配置
const firebaseConfig = {
  apiKey: "AIzaSyCd9YKlAk6emTfD5wSfznoldbV6Q2eAXGw",
  authDomain: "pregnancy-tracker-303d7.firebaseapp.com",
  databaseURL: "https://pregnancy-tracker-303d7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pregnancy-tracker-303d7",
  storageBucket: "pregnancy-tracker-303d7.firebasestorage.app",
  messagingSenderId: "977690431595",
  appId: "1:977690431595:web:16753821198c47d05ae12e"
};

// Firebase state
let firebaseApp = null;
let firebaseDb = null;
let myRooms = JSON.parse(localStorage.getItem('pregnancy_rooms') || '[]'); // [{code, name, role:'owner'|'guest'}]
let currentRoomCode = localStorage.getItem('pregnancy_current_room') || null;
let syncListener = null;
let isOnline = false;

function getCurrentRoom() {
  return myRooms.find(r => r.code === currentRoomCode) || null;
}

function saveRooms() {
  localStorage.setItem('pregnancy_rooms', JSON.stringify(myRooms));
  localStorage.setItem('pregnancy_current_room', currentRoomCode || '');
}

function initFirebase() {
  try {
    firebaseApp = firebase.initializeApp(firebaseConfig);
    firebaseDb = firebase.database();
    firebaseDb.ref('.info/connected').on('value', (snap) => {
      isOnline = snap.val() === true;
      updateSyncUI();
    });
  } catch (e) {
    console.warn('Firebase init failed:', e);
  }
}

function generateRoomCode() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let code = '';
  for (let i = 0; i < 6; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

async function createRoom() {
  if (!firebaseDb) {
    alert('Firebase 未配置，请先完成 Firebase 设置');
    return;
  }
  const name = prompt('给房间起个名字，方便区分（如"我自己"、"闺蜜小美"）：');
  if (!name || !name.trim()) return;
  const code = generateRoomCode();
  myRooms.push({ code, name: name.trim(), role: 'owner' });
  currentRoomCode = code;
  saveRooms();
  // 把房间名存到 Firebase，让加入的人能自动获取
  await firebaseDb.ref('rooms/' + code + '/meta/roomName').set(name.trim());
  await saveToFirebase();
  startListening();
  updateSyncUI();
  showSyncToast('房间「' + name.trim() + '」已创建！');
}

async function joinRoom(code) {
  if (!firebaseDb) {
    alert('Firebase 未配置，请先完成 Firebase 设置');
    return;
  }
  const cleanCode = code.trim().toLowerCase();
  if (cleanCode.length !== 6) {
    alert('房间码应为6位字符');
    return;
  }
  if (myRooms.find(r => r.code === cleanCode)) {
    alert('你已经加入过这个房间了');
    return;
  }

  try {
    // 先读取房间信息，获取房间名
    const metaSnap = await firebaseDb.ref('rooms/' + cleanCode + '/meta/roomName').once('value');
    const existingName = metaSnap.val();
    const name = existingName || ('房间 ' + cleanCode);

    const snap = await firebaseDb.ref('rooms/' + cleanCode + '/data').once('value');
    myRooms.push({ code: cleanCode, name: name, role: 'guest' });
    currentRoomCode = cleanCode;
    saveRooms();

    if (snap.exists()) {
      const data = snap.val();
      if (data.lmpDate) {
        lmpDate = new Date(data.lmpDate);
        eddDate = data.eddDate ? new Date(data.eddDate) : getEDD(lmpDate);
        localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
        localStorage.setItem('pregnancy_edd', eddDate.toISOString());
      }
      if (data.weightRecords) {
        weightRecords = data.weightRecords;
        localStorage.setItem('pregnancy_weights', JSON.stringify(weightRecords));
      }
      if (data.checkedItems) {
        checkedItems = data.checkedItems;
        localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
      }
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainApp').classList.add('active');
      updateUI();
      startListening();
      showSyncToast('已加入房间「' + name.trim() + '」！');
    } else {
      startListening();
      showSyncToast('已加入，等待数据同步...');
    }
    updateSyncUI();
  } catch (e) {
    alert('加入房间失败：' + e.message);
  }
}

async function switchRoom(code) {
  if (code === currentRoomCode) return;
  // Save current room data before switching
  await saveToFirebase();
  // Stop listening
  if (syncListener && firebaseDb && currentRoomCode) {
    firebaseDb.ref('rooms/' + currentRoomCode + '/data').off('value', syncListener);
    syncListener = null;
  }
  currentRoomCode = code;
  saveRooms();

  // Load target room data
  try {
    const snap = await firebaseDb.ref('rooms/' + code + '/data').once('value');
    if (snap.exists()) {
      const data = snap.val();
      if (data.lmpDate) {
        lmpDate = new Date(data.lmpDate);
        eddDate = data.eddDate ? new Date(data.eddDate) : getEDD(lmpDate);
        localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
        localStorage.setItem('pregnancy_edd', eddDate.toISOString());
      }
      if (data.weightRecords) {
        weightRecords = data.weightRecords;
        localStorage.setItem('pregnancy_weights', JSON.stringify(weightRecords));
      }
      if (data.checkedItems) {
        checkedItems = data.checkedItems;
        localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
      }
    }
  } catch (e) {
    console.warn('Load room data failed:', e);
  }

  if (lmpDate && document.getElementById('mainApp').classList.contains('active')) {
    updateUI();
  }
  startListening();
  updateSyncUI();
  const room = getCurrentRoom();
  if (room) showSyncToast('已切换到「' + room.name + '」');
}

async function leaveRoom(code) {
  const room = myRooms.find(r => r.code === code);
  if (!room) return;
  const confirmLeave = confirm('确定退出房间「' + room.name + '」吗？（不会删除云端数据）');
  if (!confirmLeave) return;

  if (syncListener && firebaseDb && code === currentRoomCode) {
    firebaseDb.ref('rooms/' + code + '/data').off('value', syncListener);
    syncListener = null;
  }
  myRooms = myRooms.filter(r => r.code !== code);
  if (currentRoomCode === code) {
    currentRoomCode = myRooms.length > 0 ? myRooms[0].code : null;
    if (currentRoomCode) {
      // Load data of the new current room
      try {
        const snap = await firebaseDb.ref('rooms/' + currentRoomCode + '/data').once('value');
        if (snap.exists()) {
          const data = snap.val();
          if (data.lmpDate) {
            lmpDate = new Date(data.lmpDate);
            eddDate = data.eddDate ? new Date(data.eddDate) : getEDD(lmpDate);
            localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
            localStorage.setItem('pregnancy_edd', eddDate.toISOString());
          }
          if (data.weightRecords) {
            weightRecords = data.weightRecords;
            localStorage.setItem('pregnancy_weights', JSON.stringify(weightRecords));
          }
          if (data.checkedItems) {
            checkedItems = data.checkedItems;
            localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
          }
        }
      } catch (e) {}
      startListening();
      updateUI();
    }
  }
  saveRooms();
  updateSyncUI();
  // If no rooms left, go back to setup screen
  if (myRooms.length === 0) {
    lmpDate = null;
    eddDate = null;
    localStorage.removeItem('pregnancy_lmp');
    localStorage.removeItem('pregnancy_edd');
    document.getElementById('setupScreen').style.display = '';
    document.getElementById('mainApp').classList.remove('active');
  }
  showSyncToast('已退出房间「' + room.name + '」');
}

function startListening() {
  if (!firebaseDb || !currentRoomCode) return;
  if (syncListener) {
    firebaseDb.ref('rooms/' + currentRoomCode + '/data').off('value', syncListener);
  }
  syncListener = firebaseDb.ref('rooms/' + currentRoomCode + '/data').on('value', (snap) => {
    if (!snap.exists()) return;
    const data = snap.val();

    if (data.lmpDate) {
      const newLmp = new Date(data.lmpDate);
      if (!lmpDate || newLmp.getTime() !== lmpDate.getTime()) {
        lmpDate = newLmp;
        eddDate = data.eddDate ? new Date(data.eddDate) : getEDD(lmpDate);
        localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
        localStorage.setItem('pregnancy_edd', eddDate.toISOString());
      }
    }

    if (data.weightRecords && JSON.stringify(data.weightRecords) !== JSON.stringify(weightRecords)) {
      weightRecords = data.weightRecords;
      localStorage.setItem('pregnancy_weights', JSON.stringify(weightRecords));
    }

    if (data.checkedItems && JSON.stringify(data.checkedItems) !== JSON.stringify(checkedItems)) {
      checkedItems = data.checkedItems;
      localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
    }

    if (lmpDate && document.getElementById('mainApp').classList.contains('active')) {
      updateUI();
    }
    showSyncToast('数据已同步');
  });

  // Listen for room name from Firebase and update local record
  // Also: if we are the owner, push our local room name to Firebase (backward compat)
  firebaseDb.ref('rooms/' + currentRoomCode + '/meta/roomName').once('value').then(snap => {
    const fbName = snap.val();
    const room = myRooms.find(r => r.code === currentRoomCode);
    if (!room) return;

    if (!fbName && room.name) {
      // Firebase has no name yet (old room) — push our local name
      firebaseDb.ref('rooms/' + currentRoomCode + '/meta/roomName').set(room.name);
    } else if (fbName && room.name !== fbName) {
      // Firebase has a name different from local — sync to local
      room.name = fbName;
      saveRooms();
      updateSyncUI();
    }
  });
}

async function saveToFirebase() {
  if (!firebaseDb || !currentRoomCode) return;
  try {
    await firebaseDb.ref('rooms/' + currentRoomCode + '/data').update({
      lmpDate: lmpDate ? lmpDate.toISOString() : null,
      eddDate: eddDate ? eddDate.toISOString() : null,
      weightRecords: weightRecords,
      checkedItems: checkedItems,
      lastUpdated: firebase.database.ServerValue.TIMESTAMP
    });
  } catch (e) {
    console.warn('Firebase save failed:', e);
  }
}

function copyRoomCode(code) {
  const targetCode = code || currentRoomCode;
  if (!targetCode) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(targetCode).then(() => showSyncToast('房间码已复制：' + targetCode));
  } else {
    const ta = document.createElement('textarea');
    ta.value = targetCode;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showSyncToast('房间码已复制：' + targetCode);
  }
}

function updateSyncUI() {
  const badge = document.getElementById('syncBadge');
  const room = getCurrentRoom();
  if (badge) {
    if (!currentRoomCode || !room) {
      badge.innerHTML = '<span class="sync-off">☁️ 未同步</span>';
    } else if (isOnline) {
      const roomName = room.name || room.code || '未命名房间';
      badge.innerHTML = '<span class="sync-on" onclick="copyRoomCode()" title="点击复制房间码">☁️ ' + roomName + '</span>';
    } else {
      badge.innerHTML = '<span class="sync-wait">⏳ 连接中...</span>';
    }
  }

  // Show/hide room cards on both setup screen and home page
  const showRoomCard = (myRooms.length === 0 && firebaseDb);
  const homeCard = document.getElementById('homeRoomCard');
  if (homeCard) {
    homeCard.style.display = showRoomCard ? 'block' : 'none';
  }
  const setupCard = document.getElementById('setupRoomCard');
  if (setupCard) {
    setupCard.style.display = showRoomCard ? 'block' : 'none';
  }

  renderSyncSection();
}

function showSyncToast(msg) {
  let toast = document.getElementById('syncToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'syncToast';
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

function renderSyncSection() {
  const container = document.getElementById('syncSection');
  if (!container) return;

    container.innerHTML = '<div class="sync-card"><div class="sync-title">☁️ 数据同步</div><p style="font-size:13px;color:var(--text-secondary);margin:8px 0;">配置 Firebase 后可与家人实时同步数据</p></div>';
    return;
  }

  let html = '<div class="sync-card"><div class="sync-title">☁️ 我的房间</div>';

    html += '<p style="font-size:13px;color:var(--text-secondary);margin:8px 0;">创建或加入房间，与家人/好友共享孕期数据</p>';
  } else {
    html += '<div class="room-list">';

      const isActive = room.code === currentRoomCode;

        html += '<span class="room-active-dot">●</span>';

      html += '<button class="room-leave-btn" onclick="event.stopPropagation();leaveRoom(\'' + room.code + '\')">退出</button>';

  html += '<button class="sync-btn sync-join-btn" onclick="showJoinDialog()">+ 加入房间</button>';
  html += '</div></div>';

  // Reset button
  html += '<div class="sync-card" style="margin-top:12px;">';

function showJoinDialog() {
  const code = prompt('请输入6位房间码：');

}

async function renameRoom(code) {
  const room = myRooms.find(r => r.code === code);
  if (!room) return;
  const newName = prompt('修改房间名：', room.name || '');
  if (!newName || !newName.trim()) return;
  room.name = newName.trim();
  saveRooms();
  if (firebaseDb) {
    await firebaseDb.ref('rooms/' + code + '/meta/roomName').set(newName.trim());
  }
  updateSyncUI();
  showSyncToast('房间名已修改为「' + newName.trim() + '」');
}

function resetAllData() {
  if (!confirm('确定要清除所有数据并重新开始吗？\n\n这会清除：\n· 孕期日期设置\n· 产检记录和图片\n· 体重记录\n· 房间信息\n\n此操作不可恢复！')) return;
  if (!confirm('再次确认：真的要全部清空吗？')) return;

  // Stop sync listener
  if (syncListener) {
    firebaseDb.ref('rooms/' + currentRoomCode + '/members/' + roomCode).remove();
    syncListener();
    syncListener = null;
  }

  // Clear all localStorage
  const keys = Object.keys(localStorage);
  keys.forEach(k => {
    if (k.startsWith('pregnancy_')) localStorage.removeItem(k);
  });

  // Reset state
  myRooms = [];
  currentRoomCode = null;
  roomCode = null;
  isOnline = false;
  lmpDate = null;
  eddDate = null;
  checkedItems = {};
  weights = [];

  // Reload page
  location.reload();
}

// ========== Checkup Image Functions ==========

// Compat: old format true/false vs new {checked, images:[...]}
function isChecked(key) {
  const v = checkedItems[key];
  if (v === undefined || v === null || v === false) return false;
  if (v === true || v.checked === true) return true;
  return false;
}

function getItemImages(key) {
  const v = checkedItems[key];
  if (v && typeof v === 'object' && Array.isArray(v.images)) {
    // Normalize: support both old {url} and new {data} format
    return v.images.map(img => {
      if (img && img.data) return img;
      if (img && img.url) return { data: img.url, uploadedAt: img.uploadedAt || Date.now() };
      return img;
    });
  }
  return [];
}

function migrateCheckedItem(key, checked) {
  // Convert old true/false to new object format
  const v = checkedItems[key];
  if (typeof v === 'object' && v !== null) {
    v.checked = checked;
    checkedItems[key] = v;
  } else {
    checkedItems[key] = { checked: checked, images: [] };
  }
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) {
          h = Math.round(h * maxWidth / w);
          w = maxWidth;
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function handleImageUpload(checkupKey) {
  if (!currentRoomCode) {
    alert('请先加入或创建房间再上传图片');
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) {
      alert('图片不能超过 20MB');
      return;
    }
    try {
      showSyncToast('正在压缩图片...');
      const base64 = await compressImage(file, 800, 0.5);

      // Directly read, modify, write localStorage (no global variable dependency)
      const raw = localStorage.getItem('pregnancy_checks') || '{}';
      const items = JSON.parse(raw);
      const wasChecked = (items[checkupKey] === true || (items[checkupKey] && items[checkupKey].checked === true));
      items[checkupKey] = {
        checked: wasChecked,
        images: Array.isArray(items[checkupKey] && items[checkupKey].images) ? items[checkupKey].images : []
      };
      items[checkupKey].images.push({
        data: base64,
        url: base64,  // Backward compat: old code reads img.url
        uploadedAt: Date.now()
      });
      localStorage.setItem('pregnancy_checks', JSON.stringify(items));

      // Sync global variable so saveToFirebase sends correct data
      checkedItems = items;

      showSyncToast('正在同步到云端...');
      await saveToFirebase();

      // Force re-render checkup page
      renderCheckup(Math.min(Math.max(currentWeek, 4), 40), getWeekData(Math.min(Math.max(currentWeek, 4), 40)));
      showSyncToast('图片上传成功！共 ' + items[checkupKey].images.length + ' 张');
    } catch (err) {
      console.error('Upload failed:', err);
      alert('上传失败：' + err.message);
    }
  };
  input.click();
}

async function deleteImage(checkupKey, imageIndex) {
  if (!confirm('确定删除这张图片吗？')) return;
  try {
    const item = checkedItems[checkupKey];
    if (!item || !item.images || !item.images[imageIndex]) return;

    // Remove from local data
    item.images.splice(imageIndex, 1);
    localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
    await saveToFirebase();
    updateUI();
    closePreview();
    showSyncToast('图片已删除');
  } catch (err) {
    alert('删除失败：' + err.message);
  }
}

function previewImage(url, checkupKey, imageIndex) {
  // Remove existing preview if any
  closePreview();
  const overlay = document.createElement('div');
  overlay.className = 'image-preview-overlay';
  overlay.id = 'imagePreviewOverlay';
  overlay.innerHTML = `
    <div class="image-preview-header">
      <button class="image-preview-close" onclick="closePreview()">✕</button>
      ${checkupKey && imageIndex !== undefined ? '<button class="image-preview-delete" onclick="deleteImage(\'' + checkupKey + '\', ' + imageIndex + ')">🗑️ 删除</button>' : ''}
    </div>
    <img src="${url}" class="image-preview-img" onclick="closePreview()">
  `;
  document.body.appendChild(overlay);
}

function closePreview() {
  const overlay = document.getElementById('imagePreviewOverlay');
  if (overlay) overlay.remove();
}

// Event delegation for checkup thumbnails (avoids embedding base64 in onclick)
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('checkup-thumb')) {
    const checkupKey = e.target.getAttribute('data-checkup-key');
    const imgIndex = parseInt(e.target.getAttribute('data-img-index'), 10);
    const imgSrc = e.target.src;
    previewImage(imgSrc, checkupKey, imgIndex);
  }
});

// Init Firebase
initFirebase();
// Auto-reconnect to last room
if (currentRoomCode && firebaseDb) {
  startListening();
}

// Fill in weeks with no explicit data by finding the nearest earlier week
function getWeekData(week) {
  if (WEEK_DATA[week]) return WEEK_DATA[week];
  // Find nearest earlier week
  for (let w = week - 1; w >= 4; w--) {
    if (WEEK_DATA[w]) return WEEK_DATA[w];
  }
  return WEEK_DATA[4];
}

let lmpDate = null;
let eddDate = null;
let currentWeek = 0;
let currentDay = 0;
let dateType = 'lmp';
let viewedTimelineWeek = null;

// ========== Functions ==========
function setDateType(type) {
  dateType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('dateLabel').textContent = type === 'lmp' ? '末次月经第一天' : '预产期';
}

function calculateWeek(lmp) {
  const now = new Date();
  const diff = now - lmp;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const week = Math.floor(days / 7);
  const day = days % 7;
  return { week: Math.max(0, week), day: Math.max(0, day), totalDays: days };
}

function getEDD(lmp) {
  const edd = new Date(lmp);
  edd.setDate(edd.getDate() + 280);
  return edd;
}

function startApp() {
  const dateVal = document.getElementById('dateInput').value;
  if (!dateVal) { alert('请选择日期'); return; }

  const date = new Date(dateVal + 'T00:00:00');
  if (dateType === 'lmp') {
    lmpDate = date;
    eddDate = getEDD(lmpDate);
  } else {
    eddDate = date;
    lmpDate = new Date(eddDate);
    lmpDate.setDate(lmpDate.getDate() - 280);
  }

  localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
  localStorage.setItem('pregnancy_edd', eddDate.toISOString());

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  updateUI();

  // Sync to Firebase
  saveToFirebase();
  if (roomCode && !syncListener) startListening();
}

function updateUI() {
  const calc = calculateWeek(lmpDate);
  currentWeek = calc.week;
  currentDay = calc.day;

  // Clamp to display range
  const displayWeek = Math.min(Math.max(currentWeek, 4), 40);

  // Week display
  document.getElementById('weekNum').textContent = `第 ${displayWeek} 周`;
  document.getElementById('weekLabel').textContent = `孕 ${displayWeek} 周 + ${currentDay} 天`;

  // Trimester
  let trimester = '孕早期';
  if (displayWeek >= 28) trimester = '孕晚期';
  else if (displayWeek >= 13) trimester = '孕中期';
  document.getElementById('trimesterTag').textContent = trimester;

  // Progress
  const totalDays = calc.totalDays;
  const progress = Math.min(Math.max(totalDays / 280 * 100, 0), 100);
  document.getElementById('progressPercent').textContent = progress.toFixed(1) + '%';
  document.getElementById('progressFill').style.width = progress + '%';

  // Baby size
  const data = getWeekData(displayWeek);
  document.getElementById('babyEmoji').textContent = data.emoji;
  document.getElementById('babySizeText').textContent = `大约一颗 ${data.size} 🌱`;
  document.getElementById('babySizeDesc').textContent = data.sizeDesc;

  // Days left
  const daysLeft = Math.max(0, Math.ceil((eddDate - new Date()) / (1000 * 60 * 60 * 24)));
  document.getElementById('daysLeft').textContent = daysLeft + ' 天';

  if (daysLeft <= 0 && currentWeek < 42) {
    document.getElementById('daysLeft').textContent = '随时可能发动 💕';
    document.querySelector('.days-countdown .txt').textContent = '预产期已过';
  }

  // Dev content
  renderDevContent(displayWeek, data);

  // Warning
  if (data.warning) {
    document.getElementById('warningBanner').style.display = 'flex';
    document.getElementById('warningText').textContent = data.warning;
  } else {
    document.getElementById('warningBanner').style.display = 'none';
  }

  // Tips
  renderTips(data);

  // Checkup
  renderCheckup(displayWeek, data);

  // Timeline
  viewedTimelineWeek = displayWeek;
  renderTimelineNav();
  renderTimelineContent(displayWeek);

  // Weight
  renderWeightLog();

  // Recipe seed based on today's date for daily rotation
  const today = new Date();
  recipeSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
}

      </div>

}

function renderTips(data) {
  const container = document.getElementById('tipsContent');
  container.innerHTML = data.tips.map(tip => `
    <div class="tip-card tip-${tip.type}">
      <span class="tip-icon">${tip.icon}</span>
      <div class="tip-text">${tip.text}</div>
    </div>
  `).join('');
}

function renderCheckup(week, data) {
  const container = document.getElementById('checkupContent');

  // Gather all checkups up to current week
  const allCheckups = [];
  for (let w = 4; w <= week; w++) {
    const wd = getWeekData(w);
    if (wd.checkup) {
      wd.checkup.forEach(c => {
        const key = `w${w}_${c.name}`;
        allCheckups.push({ ...c, week: w, key });
      });
    }
  }

  if (allCheckups.length === 0) {
    container.innerHTML = '<p style="color: var(--text-light); font-size: 13px; text-align: center; padding: 20px;">暂无产检项目</p>';
    return;
  }

  container.innerHTML = allCheckups.map(item => {
    const checked = isChecked(item.key);
    const images = getItemImages(item.key);
    const weekStr = item.week != null ? item.week : '';
    const nameStr = item.name || '未知检查';
    const descStr = item.desc || '';
    const tagStr = item.tag || 'normal';
    let imagesHtml = '';
    if (images.length > 0) {
      imagesHtml = '<div class="checkup-images">';
      images.forEach((img, idx) => {
        imagesHtml += `<img class="checkup-thumb" data-checkup-key="${item.key}" data-img-index="${idx}" alt="产检图片" style="background:#f0e6ff;">`;
      });
      imagesHtml += '</div>';
    }
    return `
      <div class="checklist-item">
        <div class="checkup-left">
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleCheck('${item.key}', this.checked)">
          <div class="check-content ${checked ? 'checked' : ''}">
            <h4>第${weekStr}周 · ${nameStr}</h4>
            <p>${descStr}</p>
          </div>
        </div>
        <div class="checkup-right">
          <span class="check-tag tag-${tagStr}">${tagStr === 'important' ? '必做' : tagStr === 'normal' ? '常规' : '可选'}</span>
          <button class="checkup-camera-btn" onclick="handleImageUpload('${item.key}')" title="上传产检图片">📷</button>
        </div>
        ${imagesHtml}
      </div>
    `;
  }).join('');

  // Set Base64 src via DOM to avoid innerHTML parsing issues with large data URIs
  container.querySelectorAll('.checkup-thumb').forEach(imgEl => {
    const key = imgEl.getAttribute('data-checkup-key');
    const imgIdx = parseInt(imgEl.getAttribute('data-img-index'), 10);
    const images = getItemImages(key);
    if (images[imgIdx]) {
      imgEl.src = images[imgIdx].data;
      imgEl.onerror = function() {
        this.style.width = '56px';
        this.style.height = '56px';
        this.style.display = 'flex';
        this.style.alignItems = 'center';
        this.style.justifyContent = 'center';
        this.style.background = '#fee2e2';
        this.alt = '加载失败';
        this.src = '';
      };
    }
  });
}

function toggleCheck(key, checked) {
  migrateCheckedItem(key, checked);
  localStorage.setItem('pregnancy_checks', JSON.stringify(checkedItems));
  updateUI();
  saveToFirebase();
}

  const nav = document.getElementById('timelineNav');
  // Group by trimester
  const groups = [
    { label: '孕早期', start: 4, end: 12 },
    { label: '孕中期', start: 13, end: 27 },
    { label: '孕晚期', start: 28, end: 40 },
  ];

  nav.innerHTML = groups.map(g => {
    return `<button class="timeline-btn" onclick="scrollTimeline(${g.start}, this)">${g.label} (${g.start}-${g.end}周)</button>`;
  }).join('');
}

function scrollTimeline(startWeek, btn) {
  document.querySelectorAll('.timeline-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  viewedTimelineWeek = startWeek;
  renderTimelineContent(startWeek);
}

function renderTimelineContent(week) {
  const title = document.getElementById('timelineTitle');
  const content = document.getElementById('timelineContent');
  const data = getWeekData(week);

  title.textContent = `第 ${week} 周`;

  let html = `
    <div class="dev-card">
      <div class="dev-emoji">${data.emoji}</div>
      <div class="dev-content">
        <h4>宝宝大约有${data.size}那么大</h4>
        <p>${data.dev}</p>
      </div>
    </div>
  `;

  if (data.tips) {
    html += '<div style="margin-top:16px;font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;">温馨提示</div>';
    html += data.tips.map(tip => `
      <div class="tip-card tip-${tip.type}">
        <span class="tip-icon">${tip.icon}</span>
        <div class="tip-text">${tip.text}</div>
      </div>
    `).join('');
  }

  // Nav between weeks
  html += `
    <div style="display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--pink-100);">
      <button onclick="changeTimelineWeek(-1)" style="padding:8px 16px;border:2px solid var(--pink-100);background:var(--white);border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text-secondary);${week <= 4 ? 'opacity:0.3;pointer-events:none;' : ''}">← 上一周</button>
      <button onclick="jumpToCurrent()" style="padding:8px 16px;border:2px solid var(--pink-200);background:var(--pink-light);border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--pink-500);">回到当前周</button>
      <button onclick="changeTimelineWeek(1)" style="padding:8px 16px;border:2px solid var(--pink-100);background:var(--white);border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text-secondary);${week >= 40 ? 'opacity:0.3;pointer-events:none;' : ''}">下一周 →</button>
    </div>
  `;

  content.innerHTML = html;
}

function changeTimelineWeek(delta) {
  viewedTimelineWeek = Math.min(Math.max(viewedTimelineWeek + delta, 4), 40);
  // Find the closest week with data
  while (!WEEK_DATA[viewedTimelineWeek] && viewedTimelineWeek > 4 && delta > 0) viewedTimelineWeek++;
  while (!WEEK_DATA[viewedTimelineWeek] && viewedTimelineWeek < 40 && delta < 0) viewedTimelineWeek--;
  renderTimelineContent(viewedTimelineWeek);
}

function jumpToCurrent() {
  viewedTimelineWeek = Math.min(Math.max(currentWeek, 4), 40);
  renderTimelineContent(viewedTimelineWeek);
}

let recipeSeed = 0;

function getTrimester(week) {
  if (week < 13) return 'early';
  if (week < 28) return 'mid';
  return 'late';
}

function seededRandom(seed) {
  const x = Math.sin(seed * 9301 + 49297) * 49297;
  return x - Math.floor(x);
}

function pickRecipe(meals, seed) {
  const idx = Math.floor(seededRandom(seed) * meals.length);
  return meals[idx];
}

function refreshRecipes() {
  recipeSeed = Math.floor(Math.random() * 10000);
  renderRecipes();
}

function renderRecipes() {
  const displayWeek = Math.min(Math.max(currentWeek, 4), 40);
  const trimester = getTrimester(displayWeek);
  const meals = RECIPES[trimester];

  // Date badge
  const today = new Date();
  const month = today.getMonth() + 1;
  const day = today.getDate();
  const weekDay = ['周日','周一','周二','周三','周四','周五','周六'][today.getDay()];
  document.getElementById('recipeDateBadge').innerHTML = `📅 ${month}月${day}日 ${weekDay}`;

  // Week hint
  document.getElementById('recipeWeekHint').textContent = `第${displayWeek}周 · ${trimester === 'early' ? '孕早期' : trimester === 'mid' ? '孕中期' : '孕晚期'}精选推荐`;

  const container = document.getElementById('recipeContent');

  const mealTypes = [
    { key: 'breakfast', label: '早餐', tagClass: 'meal-breakfast', emoji: '🌅' },
    { key: 'lunch', label: '午餐', tagClass: 'meal-lunch', emoji: '☀️' },
    { key: 'dinner', label: '晚餐', tagClass: 'meal-dinner', emoji: '🌙' },
    { key: 'snack', label: '加餐', tagClass: 'meal-snack', emoji: '🍪' },
  ];

  let html = '';
  mealTypes.forEach((meal, i) => {
    const recipe = pickRecipe(meals[meal.key], recipeSeed + i * 137 + displayWeek * 7);
    const nutHtml = recipe.nutrition ? Object.entries(recipe.nutrition).map(([k, v]) => {
      const labels = { cal: '热量', protein: '蛋白质', folate: '叶酸', iron: '铁', calcium: '钙', DHA: 'DHA', VC: '维C', VA: '维A', VB: '维B', fiber: '纤维', iodine: '碘', zinc: '锌', VE: '维E', collagen: '胶原' };
      return `<div class="nut-item">${labels[k] || k}: <span>${v}</span></div>`;
    }).join('') : '';

    html += `
      <div class="recipe-card">
        <div class="recipe-header">
          <div>
            <div class="recipe-name">${meal.emoji} ${recipe.name}</div>
            <div class="recipe-desc">${recipe.desc}</div>
          </div>
          <span class="meal-tag ${meal.tagClass}">${meal.label}</span>
        </div>
        <div class="recipe-ingredients">
          ${recipe.ingredients.map(ing => `<span class="ingredient">${ing}</span>`).join('')}
        </div>
        ${nutHtml ? `<div class="recipe-nutrition-bar">${nutHtml}</div>` : ''}
      </div>
    `;
  });

  // Nutrition tip for this trimester
  const tip = WEEK_NUTRITION_TIPS[trimester];
  html += `
    <div class="recipe-week-tip">
      <h4>💡 ${tip.title}</h4>
      <p>${tip.text}</p>
    </div>
  `;

  container.innerHTML = html;
}

function switchPage(page, btn) {
  document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  btn.classList.add('active');

  // Render recipes when switching to recipe page
  if (page === 'Recipe') {
    renderRecipes();
  }
}

// Weight tracking
function addWeight() {
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) return;

  const record = {
    date: new Date().toISOString(),
    week: currentWeek,
    weight: val
  };

  weightRecords.push(record);
  localStorage.setItem('pregnancy_weights', JSON.stringify(weightRecords));
  input.value = '';
  renderWeightLog();
  saveToFirebase();
}

function renderWeightLog() {
  const container = document.getElementById('weightLog');
  if (weightRecords.length === 0) {
    container.innerHTML = '<p style="color: var(--text-light); font-size: 13px; text-align: center; padding: 16px;">还没有记录，开始记录体重变化吧</p>';
    return;
  }

  // Show recent records, newest first
  const recent = [...weightRecords].reverse().slice(0, 20);
  container.innerHTML = recent.map((r, i) => {
    const d = new Date(r.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    const prev = i < weightRecords.length - 1 ? weightRecords[weightRecords.length - 1 - i - 1] : null;
    let gainStr = '';
    if (prev) {
      const diff = r.weight - prev.weight;
      gainStr = diff > 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1);
    }
    return `
      <div class="weight-entry">
        <span class="date">第${r.week}周 · ${dateStr}</span>
        <span class="val">${r.weight.toFixed(1)} kg</span>
        <span class="gain">${gainStr}</span>
      </div>
    `;
  }).join('');
}

// Edit modal
function showEditModal() {
  const modal = document.getElementById('editModal');
  modal.classList.add('active');
  const lmpStr = lmpDate.toISOString().split('T')[0];
  document.getElementById('editDateInput').value = lmpStr;
}

function hideEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

function confirmEdit() {
  const dateVal = document.getElementById('editDateInput').value;
  if (!dateVal) return;
  lmpDate = new Date(dateVal + 'T00:00:00');
  eddDate = getEDD(lmpDate);
  localStorage.setItem('pregnancy_lmp', lmpDate.toISOString());
  localStorage.setItem('pregnancy_edd', eddDate.toISOString());
  hideEditModal();
  updateUI();
  saveToFirebase();
}

  if (savedLmp) {
    lmpDate = new Date(savedLmp);
    eddDate = new Date(localStorage.getItem('pregnancy_edd'));
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('active');
    updateUI();
  }

  // Auto-reconnect to room if previously joined
  if (roomCode && firebaseDb) {
    startListening();
  }

  // Render sync section on setup page
  updateSyncUI();
}

init();
</script>
